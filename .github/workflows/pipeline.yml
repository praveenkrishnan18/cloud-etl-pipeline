name: ETL Pipeline Deployment

on:
  schedule:
    - cron: '*/5 * * * *'

  # Manual trigger from GitHub Actions UI
  workflow_dispatch:

# Future-proof GitHub Actions runtime
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  run-etl-pipeline:

    runs-on: ubuntu-latest

    steps:

      # Step 1 — Clone repository
      - name: Checkout Repository
        uses: actions/checkout@v4

      # Step 2 — Setup Python
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      # Step 3 — Upgrade pip
      - name: Upgrade pip
        run: |
          python -m pip install --upgrade pip

      # Step 4 — Install dependencies
      - name: Install Requirements
        run: |
          pip install -r requirements.txt

      # Step 5 — Show project structure (debugging)
      - name: Show Project Structure
        run: |
          pwd
          ls -R

      # Step 6 — Run unit tests
      - name: Run Pytest
        run: |
          pytest tests/ -v

      # Step 7 — Run ETL Pipeline
      - name: Execute ETL Pipeline

        env:
          AZURE_STORAGE_ACCOUNT_NAME: ${{ secrets.AZURE_STORAGE_ACCOUNT_NAME }}
          AZURE_STORAGE_ACCOUNT_KEY: ${{ secrets.AZURE_STORAGE_ACCOUNT_KEY }}
          ADLS_FILESYSTEM_NAME: ${{ secrets.ADLS_FILESYSTEM_NAME }}
          ADLS_OUTPUT_FOLDER: ${{ secrets.ADLS_OUTPUT_FOLDER }}

        run: |
          python main.py